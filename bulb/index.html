<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS</title>
    <link rel="icon" type="image/png" href="bulb/favicon.png">
    <link rel='stylesheet'
          href='https://fonts.googleapis.com/css?family=Overpass'>
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          crossorigin="anonymous"
          integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            crossorigin="anonymous"
            integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.min.js"
            crossorigin="anonymous"
            integrity="sha384-QDTA8MXPewzk8Ryt7UyfUmk+WcHcVYLcxAydowJk1WPgwjdXOIlJIDz25ITLVwTl">
    </script>
    <script src="bulb/map.js" type="text/javascript"></script>
    <script type="module">
      import init from './bulb/bulb.js';
      init();
    </script>
    <link rel="stylesheet" href="bulb/bulb.css">
  </head>
  <body>
    <div class="root">
      <div id="map_pane"></div>
      <div id="divider">
          <button id="hide_sidebar" type="button">🞂</button>
          <button id="show_sidebar" type="button" disabled>🞀</button>
      </div>
      <div id="sidebar">
        <div class="sb_row">
          <label for="sb_resource">Resource</label>
          <select id="sb_resource">
            <option></option>
            <option id="opt_action_plan" class="no-display" value="action_plan">📋 Action Plan</option>
            <option id="opt_beacon" class="no-display" value="beacon">🔆 Beacon</option>
            <option id="opt_camera" class="no-display" value="camera">🎥 Camera</option>
            <option id="opt_dms" class="no-display" value="dms">⬛ Dms</option>
            <option id="opt_gate_arm" class="no-display" value="gate_arm">⫬ Gate Arm</option>
            <option id="opt_incident" class="no-display" value="incident">🚨 Incident</option>
            <option id="opt_lcs" class="no-display" value="lcs">🠟✖🠟 LCS</option>
            <option id="opt_ramp_meter" class="no-display" value="ramp_meter">🚦 Ramp Meter</option>
            <option id="opt_video_monitor" class="no-display" value="video_monitor">📺 Video Monitor</option>
            <option id="opt_weather_sensor" class="no-display" value="weather_sensor">🌦️ Weather Sensor</option>
            <option disabled>────────</option>
            <option id="opt_controller" class="no-display" value="controller">🎛️ Controller</option>
            <option id="opt_detector" class="no-display" value="detector">🚗⬚ Detector</option>
            <option id="opt_permission" class="no-display" value="permission">🗝️ Permission</option>
            <option id="opt_system" class="no-display" value="system_attribute">📃 System</option>
            <option id="opt_toll_zone" class="no-display" value="tag_reader">🏷️ Tag Reader</option>
          </select>
          <label id="sb_monitor" class="sb_label">📺</label>
          <label id="sb_notify" class="sb_label">⚪</label>
          <input id="sb_fullscreen" class="toggle" type="checkbox" aria-label="Toggle fullscreen">
          <label for="sb_fullscreen"> ⛶ </label>
        </div>
        <div id="res_dms_row" class="no-display">
          <input id="res_dms" class="toggle" type="radio" name="res_dms" checked>
          <label for="res_dms">⬛ Dms</label>
          <input id="res_msg_pattern" class="toggle" type="radio" name="res_dms">
          <label for="res_msg_pattern">📑 Pattern</label>
          <input id="res_sign_config" class="toggle" type="radio" name="res_dms">
          <label for="res_sign_config">📐 Config</label>
          <input id="res_word" class="toggle" type="radio" name="res_dms">
          <label for="res_word">🔠 Word</label>
        </div>
        <div id="res_lcs_row" class="no-display">
          <input id="res_lcs" class="toggle" type="radio" name="res_lcs" checked>
          <label for="res_lcs">🠟✖🠟 LCS</label>
          <input id="res_lcs_state" class="toggle" type="radio" name="res_lcs">
          <label for="res_lcs_state">🠟 State</label>
        </div>
        <div id="res_video_monitor_row" class="no-display">
          <input id="res_video_monitor" class="toggle" type="radio" name="res_video" checked>
          <label for="res_video_monitor">📺 Monitor</label>
          <input id="res_monitor_style" class="toggle" type="radio" name="res_video">
          <label for="res_monitor_style">🖵 Style</label>
<!--      <input id="res_flow_stream" class="toggle" type="radio" name="res_video">
          <label for="res_flow_stream">🎞️ Stream</label> -->
        </div>
        <div id="res_controller_row" class="no-display">
          <input id="res_controller" class="toggle" type="radio" name="res_cont" checked>
          <label for="res_controller">🎛️ Controller</label>
          <input id="res_comm_link" class="toggle" type="radio" name="res_cont">
          <label for="res_comm_link">🔗 Link</label>
          <input id="res_alarm" class="toggle" type="radio" name="res_cont">
          <label for="res_alarm">📢 Alarm</label>
          <input id="res_gps" class="toggle" type="radio" name="res_cont">
          <label for="res_gps">🌐 GPS</label>
          <input id="res_modem" class="toggle" type="radio" name="res_cont">
          <label for="res_modem">🖀 Modem</label>
        </div>
        <div id="res_system_row" class="no-display">
          <input id="res_system_attr" class="toggle" type="radio" name="res_system" checked>
          <label for="res_system_attr">📃 Attribute</label>
          <input id="res_comm_config" class="toggle" type="radio" name="res_system">
          <label for="res_comm_config">📡 Comm</label>
          <input id="res_cabinet_style" class="toggle" type="radio" name="res_system">
          <label for="res_cabinet_style">🗄️ Cabinet</label>
        </div>
        <div id="res_permission_row" class="no-display">
          <input id="res_permission" class="toggle" type="radio" name="res_perm" checked>
          <label for="res_permission">🗝️ Permission</label>
          <input id="res_user" class="toggle" type="radio" name="res_perm">
          <label for="res_user">👤 User</label>
          <input id="res_role" class="toggle" type="radio" name="res_perm">
          <label for="res_role">💪 Role</label>
          <input id="res_domain" class="toggle" type="radio" name="res_perm">
          <label for="res_domain">🖧 Domain</label>
        </div>
        <div class="sb_row">
          <input id="sb_search" type="search" placeholder="🔍" size="16">
          <select id="sb_state" aria-label="State"></select>
        </div>
        <div id="sb_list"></div>
        <div id="sb_toast" class="hidden"></div>
        <div id="sb_login" class="hidden">
          <div class="form">
            <div class="row center">
              <img src="bulb/iris.svg">
            </div>
            <div class="row end">
              <span>IRIS authentication required</span>
            </div>
            <div class="row end">
              <label for="login_user">User name</label>
              <input id="login_user" type="text" name="username" autocomplete="username" required>
            </div>
            <div class="row end">
              <label for="login_pass">Password</label>
              <input id="login_pass" type="password" name="password" autocomplete="current-password" required>
            </div>
            <div class="row end">
              <button id="ob_login" type="button">Login</button>
            </div>
          </div>
          <div id="sb_shade"></div>
        </div>
      </div>
    </div>
  </body>
</html>
